spring.application.name=crypto-price-simulator

# Log seviyeleri
logging.level.root=INFO
logging.level.com.infina.cryptopricesimulator=DEBUG

# Console log formatı
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n



# Swagger UI yolu (tarayıcıdan doğrudan erişmek için)
springdoc.swagger-ui.path=/swagger-ui.html

# Endpoint'leri controller sıralamasına göre dizer
springdoc.swagger-ui.operationsSorter=alpha

# Şemaları (DTO modellerini) varsayılan olarak kaç katman derinlikte göstereceğini belirler
springdoc.swagger-ui.defaultModelsExpandDepth=1

# Swagger dökümanının arka plandaki ham JSON URL adresi
springdoc.api-docs.path=/api-docs